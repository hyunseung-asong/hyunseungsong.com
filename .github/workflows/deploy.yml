name: Deploy to DreamHost

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy via rsync
      run: |
        rsync -avz --delete \
          --exclude 'includes/db_config.php' \
          --exclude '.git/' \
          --exclude '.github/' \
          --exclude '.gitignore' \
          ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/dh_tieinj/hyunseungsong.com